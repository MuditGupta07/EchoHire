# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/muditgupta/echohire-redrob"
# Required. Must be reachable. Private repos OK if you can grant organizer
# access at Stage 3 (the email to add will be communicated then).

sandbox_link: "https://huggingface.co/spaces/muditgupta/echohire-redrob"
# Required. A working hosted environment where the ranker can be run on a small
# candidate sample. See Section 10.5 of submission_spec.md for acceptable
# platforms (HuggingFace Spaces, Streamlit Cloud, Replit, Colab, Docker, Binder).

reproduce_command: "python rank.py --candidates ./candidates.jsonl --out ./submission.csv"
# The single command that produces submission.csv from candidates.jsonl.
# Should run end-to-end within 5 minutes on CPU with 16GB RAM and no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "AMD Ryzen 5 5600H (Laptop)"                    # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 6                                  # Number of CPU cores used
  ram_gb: 8                                     # Available RAM in GB
  python_version: "3.11.3"                      # python --version
  os: "Windows 11 Home Single Language"                              # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: true              # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 72               # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Gemini"        
  - "Claude"  
  - "Other"
  # Other options: "ChatGPT", "Cursor", "Gemini", "Codeium", "Other", "None"

ai_usage_summary: |
  Gemini was used for core architectural design and iterative debugging of the
  bi-encoder + cross-encoder pipeline. Claude was used for independent code
  audit, red-teaming compliance issues, and reasoning generator logic review.
  No candidate profile data was ever passed to any external LLM API.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Offline/online decoupled IR pipeline. Offline: structural fraud filters remove
  invalid profiles, then all-MiniLM-L6-v2 generates normalized L2 FAISS indices.
  Online: FAISS ANN retrieval followed by ms-marco-MiniLM-L-6-v2 cross-encoder
  reranking. Raw semantic scores fuse multiplicatively with a sigmoid activity-decay
  behavioral readiness multiplier driven by last_active_date and recruiter response
  rate. Min-max normalization produces the final [0,1] score at full float precision.
  Fraudulent profiles (YoE mismatch, impossible rates, endorsement traps, ghost
  profiles, keyword stuffers) are eliminated pre-index. Runtime under 10 seconds
  on 6-core CPU for standard verification pools.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true        # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
